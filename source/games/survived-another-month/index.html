        function powerGlyph(type) {
            return {
                shield: 'S',
                turbo: '>>',
                shrink: '-',
                slow: 'Z',
                grow: '+',
                relief: 'L'
            }[type] || '?';
        }

        function drawPixelPowerBox(item) {
            const x = Math.round(item.x);
            const y = Math.round(item.y);
            const r = Math.round(Math.min(item.width, item.height) / 2);
            const bad = item.powerType === 'slow' || item.powerType === 'grow';
            if (drawSpriteFit('mysteryBox', x, y, 64, 64)) {
                return;
            }
            const lid = bad ? '#ef4444' : '#22c55e';
            const body = bad ? '#f97316' : '#fbbf24';
            const face = bad ? '#7c2d12' : '#fff7ed';
            pxRect(x - r + 6, y - r + 16, r * 2 - 8, r * 2 - 18, '#111827');
            pxRect(x - r, y - r + 10, r * 2 - 10, r * 2 - 20, '#78350f');
            pxRect(x - r + 5, y - r + 15, r * 2 - 20, r * 2 - 30, body);
            pxRect(x - r + 13, y - r + 23, r * 2 - 36, r * 2 - 46, face);
            pxRect(x - 14, y - r, 28, 14, lid);
            pxRect(x - 8, y - r - 7, 16, 7, '#111827');
            pxRect(x - r + 8, y - r + 16, 8, r * 2 - 32, bad ? '#fdba74' : '#fde68a');
            pxRect(x - r + 18, y - r + 26, r * 2 - 48, 4, bad ? '#fed7aa' : '#fef3c7');
            pixelText(powerGlyph(item.powerType), x - 5, y + 7, item.powerType === 'turbo' ? 16 : 21, bad ? '#fed7aa' : '#78350f');
        }

        function drawPixelItem(item) {
            if (item.type === 'income') {
                drawPixelIncome(item);
            } else if (item.type === 'weird') {
                drawPixelPowerBox(item);
            } else {
                drawPixelBill(item);
            }
            if (item.type === 'weird') {
                pixelText(t('itemPower'), item.x, item.y + 42, 10, '#fbbf24');
            }
        }

        function drawPixelWallet() {
            const x = Math.round(wallet.x);
            const y = Math.round(wallet.y);
            const red = invincibleTimer > 0 ? '#fbbf24' : wallet.dragging ? '#ef4444' : '#dc2626';
            const light = invincibleTimer > 0 ? '#fde68a' : '#f87171';
            const dark = invincibleTimer > 0 ? '#92400e' : '#7f1d1d';
            if (invincibleTimer > 0) {
                pxRect(x - wallet.radius - 4, y - wallet.radius - 4, wallet.radius * 2 + 8, 4, '#fbbf24');
                pxRect(x - wallet.radius - 4, y + wallet.radius, wallet.radius * 2 + 8, 4, '#fbbf24');
                pxRect(x - wallet.radius - 4, y - wallet.radius - 4, 4, wallet.radius * 2 + 8, '#fbbf24');
                pxRect(x + wallet.radius, y - wallet.radius - 4, 4, wallet.radius * 2 + 8, '#fbbf24');
            }
            const playerKey = invincibleTimer > 0 ? 'playerAlt' : 'player';
            const playerSize = sizeMode === 'small' ? 58 : sizeMode === 'large' ? 92 : 76;
            if (drawSpriteFit(playerKey, x, y, playerSize, playerSize)) {
                pxRect(x - 4, y - 4, 8, 8, '#111827');
                pxRect(x - 2, y - 2, 4, 4, '#fef08a');
                if (speedTimer > 0) {
                    pxRect(x - 30, y + 26, 18, 5, '#fbbf24');
                    pxRect(x + 12, y + 26, 18, 5, '#fbbf24');
                    pxRect(x - 38, y + 34, 22, 5, '#f97316');
                    pxRect(x + 16, y + 34, 22, 5, '#f97316');
                }
                return;
            }
            pxRect(x - 6, y - 40, 12, 76, '#111827');
            pxRect(x - 16, y - 31, 32, 22, '#111827');
            pxRect(x - 25, y - 20, 50, 26, '#111827');
            pxRect(x - 42, y - 10, 30, 24, '#111827');
            pxRect(x + 12, y - 10, 30, 24, '#111827');
            pxRect(x - 34, y + 8, 26, 20, '#111827');
            pxRect(x + 8, y + 8, 26, 20, '#111827');
            pxRect(x - 10, y + 17, 20, 24, '#111827');

            pxRect(x - 4, y - 36, 8, 70, dark);
            pxRect(x - 12, y - 28, 24, 17, red);
            pxRect(x - 20, y - 17, 40, 20, red);
            pxRect(x - 36, y - 7, 24, 18, red);
            pxRect(x + 12, y - 7, 24, 18, red);
            pxRect(x - 28, y + 10, 20, 15, red);
            pxRect(x + 8, y + 10, 20, 15, red);
            pxRect(x - 8, y + 18, 16, 18, red);

            pxRect(x - 9, y - 25, 18, 9, light);
            pxRect(x - 16, y - 13, 32, 7, light);
            pxRect(x - 29, y - 2, 16, 6, light);
            pxRect(x + 13, y - 2, 16, 6, light);
            pxRect(x - 4, y - 26, 8, 51, '#f8fafc');
            pxRect(x - 19, y - 3, 38, 6, '#f8fafc');
            pxRect(x - 13, y + 8, 9, 6, '#f8fafc');
            pxRect(x + 4, y + 8, 9, 6, '#f8fafc');
            pxRect(x - 3, y - 3, 6, 6, '#fef08a');
            pxRect(x - 1, y - 1, 2, 2, '#facc15');
            if (speedTimer > 0) {
                pxRect(x - 38, y + 14, 14, 5, '#fbbf24');
                pxRect(x - 46, y + 23, 18, 5, '#f97316');
                pxRect(x + 28, y + 14, 14, 5, '#fbbf24');
                pxRect(x + 28, y + 23, 18, 5, '#f97316');
            }
        }

        function drawPixelBoss() {
            if (!boss) return;
            const x = Math.round(boss.x - boss.width / 2);
            const y = Math.round(boss.y - boss.height / 2);
            const w = Math.round(boss.width);
            const h = Math.round(boss.height);
            if (drawSpriteFit('boss', boss.x, boss.y, Math.min(185, boss.width * 1.08), Math.min(160, boss.height * 1.42))) {
                pixelText(currentLang === 'en' ? 'AUDIT' : '审计', boss.x, boss.y + 58, 15, '#fef3c7');
                return;
            }
            const body = boss.hitCooldown > 0 ? '#991b1b' : '#dc2626';
            pxRect(x + 10, y + 10, w, h, '#111827');
            pxRect(x + 8, y + 4, w - 16, h + 8, '#450a0a');
            pxRect(x, y + 12, w, h - 24, body);
            pxRect(x + 16, y, w - 32, h, body);
            pxRect(x + 18, y + 14, w - 36, h - 28, '#ef4444');
            pxRect(x + 28, y + 24, 34, 28, '#111827');
            pxRect(x + w - 62, y + 24, 34, 28, '#111827');
            pxRect(x + 39, y + 34, 12, 10, '#fbbf24');
            pxRect(x + w - 51, y + 34, 12, 10, '#fbbf24');
            pxRect(x + 66, y + 65, w - 132, 12, '#7f1d1d');
            for (let tx = x + 72; tx < x + w - 72; tx += 18) {
                pxRect(tx, y + 65, 9, 18, '#fee2e2');
            }
            pxRect(x + 22, y - 17, 20, 17, '#fbbf24');
            pxRect(x + w - 42, y - 17, 20, 17, '#fbbf24');
            pxRect(x + 28, y - 11, 8, 6, '#78350f');
            pxRect(x + w - 36, y - 11, 8, 6, '#78350f');
            pxRect(x + 24, y + h - 22, 32, 18, '#7f1d1d');
            pxRect(x + w - 56, y + h - 22, 32, 18, '#7f1d1d');
            pxRect(x + 34, y + h - 15, 12, 6, '#fecaca');
            pxRect(x + w - 46, y + h - 15, 12, 6, '#fecaca');
            pixelText(currentLang === 'en' ? 'BOSS' : '账单', boss.x, boss.y - 9, 18, '#fff');
            pixelText(currentLang === 'en' ? 'AUDIT' : '审计', boss.x, boss.y + 19, 14, '#fef3c7');
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (gameState !== 'playing') return;

            const pulse = Math.sin(levelTime * 0.08);
            ctx.fillStyle = '#070914';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 38; i++) {
                const x = (i * 97 + levelTime * (boss ? 3 : 1.2)) % canvas.width;
                const y = (i * 53) % canvas.height;
                pxRect(x, y, i % 5 === 0 ? 4 : 2, i % 5 === 0 ? 4 : 2, i % 3 === 0 ? '#1e3a8a' : '#334155');
            }
            ctx.fillStyle = `rgba(255, 255, 255, ${boss ? 0.045 : 0.025})`;
            for (let y = (levelTime % 18); y < canvas.height; y += 18) {
                ctx.fillRect(0, y, canvas.width, 1);
            }
            pxRect(0, playTop - 2, canvas.width, 3, boss ? '#fbbf24' : '#334155');
            ctx.fillStyle = 'rgba(2, 6, 23, 0.48)';
            ctx.fillRect(0, 0, canvas.width, playTop - 2);
            ctx.strokeStyle = boss ? 'rgba(251, 191, 36, 0.35)' : 'rgba(74, 222, 128, 0.18)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let x = 0; x <= canvas.width; x += 24) {
                const y = canvas.height - 38 + Math.sin(x * 0.04 + levelTime * 0.08) * (boss ? 12 : 6);
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            if (boss) {
                ctx.fillStyle = `rgba(239, 68, 68, ${0.08 + Math.abs(pulse) * 0.06})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            // 余额警告效果
            if (money < 500 && money > 0) {
                ctx.strokeStyle = 'rgba(239, 68, 68, 0.3)';
                ctx.lineWidth = 8;
                ctx.strokeRect(0, 0, canvas.width, canvas.height);
            } else if (money <= 0 && money > -2000) {
                ctx.strokeStyle = 'rgba(239, 68, 68, 0.6)';
                ctx.lineWidth = 12;
                ctx.strokeRect(0, 0, canvas.width, canvas.height);
            }

            if (hitFlash > 0) {
                const alpha = hitFlash / 40;
                ctx.fillStyle = lastHitType === 'income' ? `rgba(16, 185, 129, ${alpha})` : `rgba(239, 68, 68, ${alpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                hitFlash--;
            }
            
            const m = months[currentMonth];
            const mobileHud = isPhoneMode();
            const hudW = mobileHud ? 188 : 250;
            const hudH = mobileHud ? 98 : 112;
            pxRect(8, 8, hudW, hudH, 'rgba(2, 6, 23, 0.86)');
            pxRect(8, 8, hudW, 4, '#334155');
            pxRect(8, 8 + hudH, hudW, 4, '#334155');
            pxRect(8, 8, 4, hudH, '#334155');
            pxRect(8 + hudW - 4, 8, 4, hudH, '#334155');
            pixelText(monthName(currentMonth), 18, mobileHud ? 30 : 34, mobileHud ? 14 : 18, '#a5b4fc', 'left');
            pixelText('$' + money.toLocaleString(), 18, mobileHud ? 66 : 78, mobileHud ? 25 : 34, money > 0 ? '#4ade80' : '#ef4444', 'left');
            
            // 余额警告文字
            if (money <= 0 && money > -2000) {
                pixelText(t('creditMode'), 18, mobileHud ? 124 : 150, mobileHud ? 10 : 14, '#ef4444', 'left');
            }
            
            const timeLeft = Math.ceil((levelDuration - levelTime) / 60);
            pixelText(`M${currentMonth+1}/12  ${timeLeft}s`, 18, mobileHud ? 92 : 104, mobileHud ? 11 : 14, '#94a3b8', 'left');
            
            const pressureW = mobileHud ? 128 : 180;
            pxRect(18, mobileHud ? 112 : 126, pressureW, 10, '#1e293b');
            pxRect(18, mobileHud ? 112 : 126, pressureW * pressure / 100, 10, pressure > 72 ? '#ef4444' : pressure > 44 ? '#f59e0b' : '#22c55e');
            pixelText(boss ? `${t('bossFreeze')} ${Math.round(pressure)}%` : `${t('lateHud')} ${Math.round(pressure)}%`, mobileHud ? 152 : 206, mobileHud ? 121 : 137, mobileHud ? 9 : 11, '#cbd5e1', 'left');
            
            if (!mobileHud && combo >= 3) {
                ctx.fillStyle = '#fbbf24';
                pixelText(`${currentLang === 'en' ? 'COMBO' : '连击'} x${combo}`, 18, money <= 0 ? 176 : 160, 16, '#fbbf24', 'left');
            }
            const effects = [];
            if (invincibleTimer > 0) effects.push(currentLang === 'en' ? 'SHIELD' : '护盾');
            if (speedTimer > 0) effects.push(currentLang === 'en' ? 'FAST' : '加速');
            if (slowTimer > 0) effects.push(currentLang === 'en' ? 'SLOW' : '减速');
            if (sizeMode === 'small') effects.push(currentLang === 'en' ? 'SMALL' : '变小');
            if (sizeMode === 'large') effects.push(currentLang === 'en' ? 'BIG' : '变大');
            if (!mobileHud && effects.length) {
                pixelText(effects.join(' / '), 18, money <= 0 ? 198 : 180, 13, '#fbbf24', 'left');
            }
            if (!mobileHud && grazeCount > 0) {
                const grazeY = effects.length ? (money <= 0 ? 218 : 200) : (money <= 0 ? 198 : 180);
                pixelText(`${currentLang === 'en' ? 'GRAZE' : '擦账单'} x${grazeCount}`, 18, grazeY, 13, '#fde68a', 'left');
            }

            if (boss) {
                const ratio = Math.max(0, boss.timer / bossDuration);
                ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
                ctx.fillRect(canvas.width / 2 - 160, 18, 320, 14);
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(canvas.width / 2 - 160, 18, 320 * ratio, 14);
                ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                ctx.strokeRect(canvas.width / 2 - 160, 18, 320, 14);
                pixelText(currentLang === 'en' ? `Month-end audit: ${displayName(boss.name)}` : `月底审计期：${displayName(boss.name)}`, canvas.width / 2 + Math.sin(levelTime * 0.4) * 2, 13, 13, '#fff');
                pixelText(currentLang === 'en' ? 'BILL STORM' : '账 单 风 暴', canvas.width / 2, 58 + Math.sin(levelTime * 0.15) * 3, 18, '#fbbf24');
            }

            if (levelTime >= bossStartTime - 120 && !boss) {
                const incoming = Math.max(1, Math.ceil((bossStartTime - levelTime) / 60));
                pixelText(`${t('bossIncoming')} ${incoming}`, canvas.width / 2, (playTop + playableBottom()) / 2, 24, '#fbbf24');
            }
            
            ctx.save();
            ctx.beginPath();
            ctx.rect(0, playTop, canvas.width, playableBottom() - playTop);
            ctx.clip();
            items.forEach(drawPixelItem);
            drawPixelBoss();
            drawPixelWallet();
            ctx.restore();
            drawFloatMessages();
            
            if (levelTime < 180) {
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.font = '18px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(currentLang === 'en' ? 'Green lowers pressure. Red bills hurt. Ignore too much and late fees grow.' : '绿收入降压，红账单斩杀，躲太多也会逾期！', canvas.width/2, canvas.height - 25);
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        canvas.addEventListener('mousedown', e => {
            if (gameState !== 'playing') return;
            const p = pointerPosition(e);
            startDraggingAt(p.x, p.y);
        });
        
        canvas.addEventListener('mousemove', e => {
            if (!wallet.dragging) return;
            const p = pointerPosition(e);
            moveWalletTo(p.x, p.y);
        });
        
        canvas.addEventListener('mouseup', () => wallet.dragging = false);
        
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            if (gameState !== 'playing') return;
            const p = pointerPosition(e);
            startDraggingAt(p.x, p.y);
        });
        
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!wallet.dragging) return;
            const p = pointerPosition(e);
            moveWalletTo(p.x, p.y);
        });
        
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            wallet.dragging = false;
        });

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 120));
        
        function startGame() {
            ensureAudio();
            money = 3500;
            currentMonth = 0;
            expenses = [];
            monthExpenses = [];
            monthStartMoney = 3500;
            combo = 0;
            pressure = 0;
            killReason = '';
            reviveUsed = false;
            invincibleTimer = 0;
            speedTimer = 0;
            slowTimer = 0;
            sizeTimer = 0;
            sizeMode = 'normal';
            grazeCount = 0;
            floatMessages = [];
            wallet.radius = wallet.baseRadius;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('reviveScreen').classList.add('hidden');
            showLevelScreen();
        }
        
        function showLevelScreen() {
            const m = months[currentMonth];
            document.getElementById('monthTitle').textContent = monthName(currentMonth);
            document.getElementById('monthDesc').textContent = currentLang === 'en' ? monthDescsEn[currentMonth] : m.desc;
            document.getElementById('currentMoney').textContent = '$' + money.toLocaleString();
            
            const fixedText = m.fixed
                .map(f => `${displayName(f.n)} -$${Math.abs(f.a).toLocaleString()}`)
                .join(' | ');
            document.getElementById('fixedCosts').textContent = t('fixedCosts') + fixedText;
            document.getElementById('nextLevelBtn').textContent = t('enterMonth');
            
            document.getElementById('levelScreen').classList.remove('hidden');
        }
        
        function startLevel() {
            gameState = 'playing';
            items = [];
            itemTimer = 0;
            wallet.x = canvas.width / 2;
            wallet.y = (playTop + playableBottom()) / 2;
            wallet.targetX = wallet.x;
            wallet.targetY = wallet.y;
            wallet.dragging = false;
            invincibleTimer = 0;
            speedTimer = 0;
            slowTimer = 0;
            sizeTimer = 0;
            sizeMode = 'normal';
            grazeCount = 0;
            floatMessages = [];
            wallet.radius = wallet.baseRadius;
            
            prepareMonth();
            
            document.getElementById('levelScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.add('hidden');
            document.getElementById('reviveScreen').classList.add('hidden');
        }
        
        function finishMonth() {
            gameState = 'monthEnd';
            playSfx('month');
            
            const activeExpenses = monthExpenses.filter(e => e.kind !== 'fixed' && e.kind !== 'salary');
            const worstOne = (activeExpenses.length ? activeExpenses : monthExpenses)
                .filter(e => e.amount < 0)
                .sort((a, b) => a.amount - b.amount)[0];
            const netChange = money - monthStartMoney;
            const netNode = document.getElementById('monthNetChange');
            
            const m = months[currentMonth];
            document.getElementById('monthEndTitle').textContent = currentLang === 'en'
                ? `${monthName(currentMonth)} cleared`
                : `${monthName(currentMonth)} 结束`;
            document.getElementById('monthBadge').textContent = currentLang === 'en'
                ? `Month ${currentMonth + 1} / 12`
                : `第 ${currentMonth + 1} / 12 个月`;
            const iconKey = worstOne ? billSpriteKey({ name: worstOne.name, type: worstOne.kind }) : 'audit-boss';
            const iconPath = spritePaths[iconKey] || 'audit-boss.png';
            document.getElementById('monthEndIcon').src = assetBase + iconPath;
            document.getElementById('worstExpense').textContent = worstOne ? 
                displayName(worstOne.name) + ' -$' + Math.abs(worstOne.amount) : t('noLoss');
            document.getElementById('monthEndMoney').textContent = '$' + money.toLocaleString();
            netNode.textContent = (netChange >= 0 ? '+$' : '-$') + Math.abs(netChange).toLocaleString();
            netNode.style.color = netChange >= 0 ? '#4ade80' : '#ef4444';
            document.getElementById('monthEndQuote').textContent = currentLang === 'en' ? monthQuotesEn[currentMonth] : m.quote;
            document.getElementById('continueBtn').textContent =
                currentMonth >= 11 ? t('continueFinal') : `${t('continueNext')}${monthName(currentMonth + 1)}`;
            
            document.getElementById('monthEndScreen').classList.remove('hidden');
        }
        
        function continueToNextMonth() {
            document.getElementById('monthEndScreen').classList.add('hidden');
            currentMonth++;
            
            if (currentMonth >= 12) {
                gameWin();
            } else {
                startLevel();
            }
        }
        
        function gameWin() {
            gameState = 'end';
            showEndScreen(true);
        }
        
        function gameOver() {
            gameState = 'end';
            playSfx('gameover');
            document.getElementById('reviveScreen').classList.add('hidden');
            showEndScreen(false);
        }
        
        function showEndScreen(won) {
            const title = currentLang === 'en'
                ? (won ? '🎉 Survived 12 months!' : '💸 Canadian bills got you')
                : (won ? '🎉 活过12个月！' : '💸 被加拿大账单斩杀');
            document.getElementById('endTitle').textContent = title;
            document.getElementById('finalMoney').textContent = '$' + money.toLocaleString();
            const survived = won ? '12' : Math.min(currentMonth + 1, 12);
            document.getElementById('survivedMonths').textContent = survived;
            document.getElementById('survivalLine').innerHTML =
                `${t('survivedPrefix')}<span id="survivedMonths" class="money">${survived}</span>${t('monthUnit')}`;
            
            const groupedLosses = expenses
                .filter(e => e.amount < 0 && e.kind !== 'fixed' && e.kind !== 'salary')
                .reduce((map, e) => {
                    const key = `${e.kind}:${e.name}`;
                    const current = map.get(key) || { ...e, amount: 0, count: 0 };
                    current.amount += e.amount;
                    current.count++;
                    map.set(key, current);
                    return map;
                }, new Map());
            const top3List = [...groupedLosses.values()]
                .sort((a, b) => a.amount - b.amount)
                .slice(0, 3)
                .map((e, i) => {
                    const count = e.count > 1 ? ` x${e.count}` : '';
                    return `${i+1}. ${formatEventName(e.name, e.kind)} $${Math.abs(e.amount)}${count}`;
                });
            if (reviveUsed) {
                top3List.unshift(currentLang === 'en'
                    ? `Revive: 💳 spent $${reviveCost.toLocaleString()} to buy one more chance`
                    : `续命记录：💳 花 $${reviveCost.toLocaleString()} 买回一条命`);
            }
            if (!won && killReason) {
                top3List.unshift(currentLang === 'en'
                    ? `Final killshot: ${translateKillReason(killReason)}`
                    : `最终斩杀：${killReason === '逾期压力被斩杀' ? '⏰ 逾期压力爆表' : '💳 现金流断档'}`);
            }
            document.getElementById('killCauses').innerHTML = top3List.join('<br>') || t('noLoss');
            
            let msg = '';
            if (currentLang === 'en') {
                if (!won) msg = 'Bill verdict: the bills did not win. You just stepped out for coffee.';
                else if (money > 5000) msg = 'Bill verdict: you turned Canada into a cash-flow simulator.';
                else if (money > 2000) msg = 'Bill verdict: you survived and ignored enough promo emails.';
                else if (money > 0) msg = 'Bill verdict: the balance is alive, so are you.';
                else if (money > -1000) msg = 'Bill verdict: the credit card is smoking, but not screaming.';
                else msg = 'Bill verdict: the real boss was month-end.';
            } else {
                if (!won) {
                    msg = '账单评语：账单没有赢，你只是先去泡杯咖啡。';
                } else if (money > 5000) {
                    msg = '账单评语：你把加拿大玩成了现金流管理模拟器。';
                } else if (money > 2000) {
                    msg = '账单评语：还有结余，说明你和促销邮件保持了距离。';
                } else if (money > 0) {
                    msg = '账单评语：余额还亮着，心跳也还亮着。';
                } else if (money > -1000) {
                    msg = '账单评语：信用卡在冒烟，但还没报警。';
                } else {
                    msg = '账单评语：本局最大敌人不是 Boss，是月底。';
                }
            }
            
            document.getElementById('resultMessage').textContent = msg;
            document.getElementById('endScreen').classList.remove('hidden');
        }

        function buildShareText() {
            const months = document.getElementById('survivedMonths').textContent;
            const causes = document.getElementById('killCauses').innerHTML
                .replace(/<br>/g, '\n')
                .replace(/&nbsp;/g, ' ');
            const finalMoney = document.getElementById('finalMoney').textContent;
            return currentLang === 'en'
                ? `I survived Canada for ${months} months\n\nKillshot log:\n${causes}\n\nFinal balance: ${finalMoney}\n\nSurvived Another Month · ${gameVersion}\n${t('sourceLine')}`
                : `我在加拿大活了 ${months} 个月\n\n斩杀记录：\n${causes}\n\n最终余额：${finalMoney}\n\n《本月又活下来了》· ${gameVersion}\n${t('sourceLine')}`;
        }

        function fillShareCard() {
            const months = document.getElementById('survivedMonths').textContent;
            const balance = document.getElementById('finalMoney').textContent;
            const kills = document.getElementById('killCauses').innerHTML;
            const verdict = document.getElementById('resultMessage').textContent;
            document.getElementById('shareMonths').textContent = months;
            document.getElementById('shareBalance').textContent = balance;
            document.getElementById('shareKills').innerHTML = kills || t('noLoss');
            document.getElementById('shareVerdict').textContent = verdict;
            document.getElementById('shareText').textContent = buildShareText();
        }

        async function copyShareText() {
            const shareText = document.getElementById('shareText');
            const text = shareText.textContent;
            try {
                await navigator.clipboard.writeText(text);
                document.getElementById('copyStatus').textContent = currentLang === 'en' ? 'Report copied' : '战报已复制';
                shareText.classList.add('hidden');
            } catch {
                document.getElementById('copyStatus').textContent = currentLang === 'en'
                    ? 'Browser blocked auto-copy. You can manually select the text below.'
                    : '浏览器不允许自动复制，可以手动选中下方文案';
                shareText.classList.remove('hidden');
            }
        }
        
        document.getElementById('langZh').addEventListener('click', () => setLanguage('zh'));
        document.getElementById('langEn').addEventListener('click', () => setLanguage('en'));
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('nextLevelBtn').addEventListener('click', startLevel);
        document.getElementById('continueBtn').addEventListener('click', continueToNextMonth);
        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('endScreen').classList.add('hidden');
            startGame();
        });
        document.getElementById('reviveBtn').addEventListener('click', revivePlayer);
        document.getElementById('giveUpBtn').addEventListener('click', gameOver);
        document.getElementById('shareBtn').addEventListener('click', () => {
            fillShareCard();
            document.getElementById('copyStatus').textContent = t('copyReady');
            document.getElementById('shareScreen').classList.remove('hidden');
            copyShareText();
        });
        document.getElementById('copyBtn').addEventListener('click', copyShareText);
        document.getElementById('closeShareBtn').addEventListener('click', () => {
            document.getElementById('shareScreen').classList.add('hidden');
        });
        warnMissingTranslations();
        applyLanguage();
        
        gameLoop();
    </script>
</body>
</html>
