<!DOCTYPE html>
<!-- build: mobile-landscape-startfix2 -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本月又活下来了 | Survive Another Month in Canada</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html,
        body {
            width: 100%;
            height: 100%;
            min-height: 100%;
            overscroll-behavior: none;
        }
        body {
            font-family: "Courier New", Consolas, "Microsoft YaHei", monospace;
            background:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
                #090b12;
            background-size: 12px 12px;
            color: #fff;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: #070914;
            box-shadow:
                0 0 0 4px #111827,
                0 0 0 8px #020617,
                0 0 40px rgba(0, 0, 0, 0.8);
            image-rendering: pixelated;
            touch-action: none;
        }
        #gameCanvas.hit {
            animation: canvasHit 0.18s ease-out;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            overflow-y: auto;
        }
        .hidden { display: none; }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 4px 4px 0 #000, 0 0 20px rgba(255, 0, 0, 0.5);
        }
        .subtitle {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 1.5rem;
        }
        button {
            padding: 0.8rem 2.5rem;
            font-size: 1.3rem;
            background: #3b2f8f;
            border: 3px solid #a5b4fc;
            color: white;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            margin: 0.5rem;
            box-shadow: 5px 5px 0 #111827;
        }
        button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0 #111827;
        }
        .money {
            color: #4ade80;
            font-weight: bold;
            font-size: 2rem;
        }
        .warning { color: #ef4444; }
        .info {
            color: #888;
            font-size: 0.95rem;
            margin: 1rem 0;
            max-width: 600px;
            text-align: center;
            line-height: 1.6;
        }
        .rules {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.65rem;
            width: min(620px, 92vw);
            margin: 1rem 0;
        }
        .rule {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 0;
            padding: 0.75rem;
            color: #bbb;
            font-size: 0.92rem;
            line-height: 1.45;
        }
        .rule strong {
            color: #fff;
            display: block;
            margin-bottom: 0.25rem;
        }
        .lang-switch {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 120;
            display: flex;
            gap: 6px;
        }
        .lang-switch button {
            padding: 0.35rem 0.55rem;
            margin: 0;
            font-size: 0.78rem;
            border-width: 2px;
            box-shadow: 3px 3px 0 #111827;
            background: #111827;
        }
        .lang-switch button.active {
            background: #059669;
            border-color: #6ee7b7;
        }
        .month-title {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #667eea;
        }
        #startScreen {
            background:
                linear-gradient(180deg, rgba(2, 6, 23, 0.34), rgba(2, 6, 23, 0.92)),
                url('assets/canada-sprites/title-bg.png') center/cover no-repeat;
        }
        #endScreen,
        #shareScreen {
            background:
                linear-gradient(180deg, rgba(2, 6, 23, 0.66), rgba(2, 6, 23, 0.95)),
                url('assets/canada-sprites/result-bg.png') center/cover no-repeat;
        }
        .screen-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            margin-bottom: 0.9rem;
            padding: 0.45rem 0.75rem;
            background: rgba(15, 23, 42, 0.78);
            border: 2px solid rgba(165, 180, 252, 0.7);
            box-shadow: 4px 4px 0 rgba(15, 23, 42, 0.9);
            color: #c7d2fe;
            font-size: 0.86rem;
            letter-spacing: 0;
        }
        .month-end-icon {
            width: 86px;
            height: 86px;
            object-fit: contain;
            image-rendering: pixelated;
            filter: drop-shadow(6px 6px 0 rgba(0,0,0,0.45));
            margin-bottom: 0.75rem;
        }
        .result-list {
            text-align: left;
            margin: 1rem 0;
            font-size: 1.1rem;
            line-height: 1.8;
        }
        .death-cause {
            background: rgba(239, 68, 68, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            margin: 0.5rem 0;
        }
        .share-box {
            width: min(560px, 92vw);
            max-height: 160px;
            overflow: auto;
            background: rgba(15, 15, 30, 0.72);
            border: 1px dashed rgba(255,255,255,0.18);
            border-radius: 8px;
            padding: 0.85rem;
            color: #9ca3af;
            font-size: 0.9rem;
            line-height: 1.55;
            white-space: pre-wrap;
            user-select: text;
        }
        .share-card {
            width: min(560px, 92vw);
            background:
                linear-gradient(90deg, rgba(17, 24, 39, 0.97) 0%, rgba(17, 24, 39, 0.9) 62%, rgba(17, 24, 39, 0.55) 100%),
                url('assets/canada-sprites/result-bg.png') right bottom/280px auto no-repeat,
                radial-gradient(circle at 20% 10%, rgba(74, 222, 128, 0.22), transparent 28%),
                radial-gradient(circle at 85% 20%, rgba(239, 68, 68, 0.18), transparent 30%),
                #111827;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 0;
            padding: 1.25rem;
            box-shadow: 0 24px 80px rgba(0,0,0,0.45);
        }
        .share-card h2 {
            font-size: 1.9rem;
            margin-bottom: 0.25rem;
        }
        .share-kicker {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .share-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
            margin: 1rem 0;
        }
        .share-stat {
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 0.85rem;
            background: rgba(255,255,255,0.06);
        }
        .share-stat span {
            display: block;
            color: #9ca3af;
            font-size: 0.78rem;
            margin-bottom: 0.25rem;
        }
        .share-stat strong {
            font-size: 1.65rem;
            color: #4ade80;
        }
        .share-kills {
            margin-top: 0.8rem;
            color: #e5e7eb;
            line-height: 1.7;
        }
        .share-verdict {
            margin-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.12);
            padding-top: 0.9rem;
            color: #fbbf24;
            font-weight: bold;
        }
        .source-line {
            margin-top: 0.85rem;
            color: #a7f3d0;
            font-size: 0.9rem;
            line-height: 1.45;
        }
        .version-tag {
            margin: -0.6rem 0 0.9rem;
            color: #c7d2fe;
            font-size: 0.82rem;
            font-weight: 900;
            letter-spacing: 0;
            text-shadow: 2px 2px 0 #020617;
        }
        .start-hook {
            margin: -0.25rem 0 0.75rem;
            padding: 0.45rem 0.7rem;
            color: #fef3c7;
            background: rgba(127, 29, 29, 0.72);
            border: 2px solid rgba(251, 191, 36, 0.8);
            box-shadow: 4px 4px 0 rgba(2, 6, 23, 0.88);
            font-size: 0.95rem;
            font-weight: 900;
            text-align: center;
        }
        .rotate-screen {
            position: fixed;
            inset: 0;
            z-index: 240;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 24px;
            background:
                linear-gradient(180deg, rgba(2, 6, 23, 0.82), rgba(2, 6, 23, 0.96)),
                url('assets/canada-sprites/title-bg.png') center/cover no-repeat;
            color: #fff;
            text-align: center;
        }
        .rotate-screen.hidden {
            display: none;
        }
        .rotate-icon {
            width: 84px;
            height: 84px;
            border: 4px solid #a5b4fc;
            box-shadow: 7px 7px 0 #020617;
            display: grid;
            place-items: center;
            background: rgba(15, 23, 42, 0.86);
            color: #fbbf24;
            font-size: 2.5rem;
            transform: rotate(90deg);
        }
        .rotate-screen strong {
            font-size: 1.35rem;
            color: #fef3c7;
            text-shadow: 3px 3px 0 #020617;
        }
        .rotate-screen p {
            max-width: 320px;
            color: #cbd5e1;
            line-height: 1.55;
            font-size: 0.95rem;
        }
        @media (max-width: 560px) {
            .rules, .share-stats { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
            .overlay {
                justify-content: flex-start;
                padding: max(16px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
            }
            .lang-switch {
                top: max(10px, env(safe-area-inset-top));
                right: 10px;
            }
            .screen-badge {
                margin-top: 42px;
            }
            button {
                width: min(320px, 88vw);
                padding: 0.72rem 1rem;
                font-size: 1.05rem;
            }
            .info {
                font-size: 0.86rem;
                line-height: 1.45;
            }
            .rule {
                padding: 0.62rem;
                font-size: 0.82rem;
            }
            .share-card {
                padding: 1rem;
                background-size: auto, 210px auto, auto, auto, auto;
            }
        }
        @media (max-height: 620px) {
            h1 { font-size: 1.7rem; margin-bottom: 0.55rem; }
            .subtitle { margin-bottom: 0.75rem; }
            .rules { gap: 0.45rem; margin: 0.6rem 0; }
            .rule { padding: 0.5rem; font-size: 0.78rem; }
            .info { margin: 0.55rem 0; }
            .month-title { font-size: 1.45rem; margin-bottom: 0.55rem; }
            .result-list { margin: 0.65rem 0; line-height: 1.55; }
        }
        @media (orientation: landscape) and (max-height: 520px) {
            .overlay {
                justify-content: center;
                padding: 10px 14px;
            }
            #startScreen .screen-badge {
                margin: 0 0 0.35rem;
                padding: 0.28rem 0.55rem;
                font-size: 0.68rem;
            }
            #startScreen h1 {
                font-size: 1.55rem;
                margin-bottom: 0.35rem;
            }
            #startScreen .subtitle {
                margin-bottom: 0.35rem;
                font-size: 0.82rem;
            }
            #gameVersionTag {
                margin: -0.15rem 0 0.35rem;
                font-size: 0.68rem;
            }
            #startHook {
                margin: 0 0 0.45rem;
                padding: 0.32rem 0.55rem;
                font-size: 0.78rem;
            }
            #startInfo,
            #rulesBox {
                display: none;
            }
            #startBtn {
                margin-top: 0.1rem;
            }
        }
        .toast {
            position: fixed;
            top: 18%;
            right: 1rem;
            transform: translateX(0);
            background: rgba(0, 0, 0, 0.95);
            color: #fbbf24;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            animation: toastFade 2s ease-out forwards;
            border: 2px solid #fbbf24;
            max-width: min(330px, 70vw);
            text-align: left;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
            white-space: pre-line;
        }
        .float-text {
            position: fixed;
            top: 128px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            animation: floatUp 1.2s ease-out forwards;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        @keyframes toastFade {
            0% { opacity: 0; transform: translateX(18px) scale(0.9); }
            15% { opacity: 1; transform: translateX(0) scale(1.03); }
            85% { opacity: 1; transform: translateX(0) scale(1); }
            100% { opacity: 0; transform: translateX(18px) scale(0.96); }
        }
        @keyframes floatUp {
            0% { opacity: 0; top: 132px; }
            20% { opacity: 1; top: 124px; }
            80% { opacity: 1; top: 116px; }
            100% { opacity: 0; top: 108px; }
        }
        @keyframes canvasHit {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="lang-switch">
        <button id="langZh" type="button">中文</button>
        <button id="langEn" type="button">EN</button>
    </div>

    <div id="rotateScreen" class="rotate-screen hidden">
        <div class="rotate-icon">↻</div>
        <strong id="rotateTitle">横屏开玩</strong>
        <p id="rotateText">请把手机横过来。</p>
    </div>
    
    <div id="startScreen" class="overlay">
        <div id="startBadge" class="screen-badge">CANADA CASHFLOW SURVIVAL</div>
        <h1 id="startTitle">本月又活下来了</h1>
        <div id="startSubtitle" class="subtitle">加拿大现金流闪避小游戏</div>
        <div id="gameVersionTag" class="version-tag">betaCL001</div>
        <div id="startHook" class="start-hook">绿色回血，红色扣钱，黄色看命。</div>
        <div id="startInfo" class="info"></div>
        <div id="rulesBox" class="rules">
        </div>
        <button id="startBtn">开始挑战</button>
    </div>
    
    <div id="levelScreen" class="overlay hidden">
        <div class="month-title" id="monthTitle"></div>
        <div class="subtitle" id="monthDesc"></div>
        <div style="font-size: 1.2rem; margin: 1rem 0;">
            <div><span id="currentMoneyLabel">当前存款：</span><span id="currentMoney" class="money"></span></div>
            <div id="salaryLine" style="color: #10b981; margin-top: 0.5rem;">工资到账：+$3,500</div>
        </div>
        <div id="fixedCosts" class="info"></div>
        <button id="nextLevelBtn">进入这个月</button>
    </div>
    
    <div id="monthEndScreen" class="overlay hidden">
        <img id="monthEndIcon" class="month-end-icon" src="assets/canada-sprites/audit-boss.png" alt="">
        <div id="monthBadge" class="screen-badge"></div>
        <div class="month-title" id="monthEndTitle"></div>
        <div class="result-list" style="font-size: 1.3rem; margin: 2rem 0;">
            <div style="margin: 1rem 0;">
                <strong id="worstExpenseLabel">本月最狠一刀：</strong><br>
                <span id="worstExpense" style="color: #ef4444; font-size: 1.5rem;"></span>
            </div>
            <div style="margin: 1rem 0;">
                <strong id="monthBalanceLabel">本月余额：</strong>
                <span id="monthEndMoney" class="money"></span>
            </div>
            <div style="margin: 1rem 0;">
                <strong id="monthNetLabel">本月净变化：</strong>
                <span id="monthNetChange"></span>
            </div>
            <div style="margin: 1rem 0; color: #888; font-style: italic;" id="monthEndQuote"></div>
        </div>
        <button id="continueBtn">进入下个月</button>
    </div>
    
    <div id="endScreen" class="overlay hidden">
        <h1 id="endTitle"></h1>
        <div class="result-list">
            <div id="survivalLine" style="font-size: 1.5rem; margin: 1.5rem 0;">我在加拿大活了 <span id="survivedMonths" class="money"></span> 个月</div>
            <div style="margin: 1rem 0;"><strong id="killRecordLabel">斩杀记录：</strong></div>
            <div id="killCauses" style="font-size: 1.2rem; line-height: 1.8;"></div>
            <div style="margin: 1rem 0;"><span id="finalBalanceLabel">最终余额：</span><span id="finalMoney" class="money"></span></div>
        </div>
        <div id="resultMessage" class="subtitle" style="margin-top: 1.5rem; font-size: 1.3rem; border-top: 1px solid #333; padding-top: 1rem;"></div>
        <div id="resultSourceLine" class="source-line"></div>
        <button id="restartBtn">再活一次</button>
        <button id="shareBtn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">保存这份惨案</button>
    </div>

    <div id="reviveScreen" class="overlay hidden">
        <div id="reviveTitle" class="month-title">账单准备斩杀你</div>
        <div class="info" id="reviveText"></div>
        <button id="reviveBtn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">花存款续命</button>
        <button id="giveUpBtn">不救了，结算</button>
    </div>

    <div id="shareScreen" class="overlay hidden">
        <div id="shareCard" class="share-card">
            <div id="shareKicker" class="share-kicker">CANADA CASHFLOW SURVIVAL REPORT</div>
            <h2 id="shareTitle">本月又活下来了</h2>
            <div class="share-stats">
                <div class="share-stat"><span id="shareMonthsLabel">存活时间</span><strong><span id="shareMonths"></span><span id="shareMonthUnit">个月</span></strong></div>
                <div class="share-stat"><span id="shareBalanceLabel">最终余额</span><strong id="shareBalance"></strong></div>
            </div>
            <div class="share-kills">
                <strong id="shareKillsLabel">斩杀记录</strong>
                <div id="shareKills"></div>
            </div>
            <div id="shareVerdict" class="share-verdict"></div>
            <div id="shareSourceLine" class="source-line"></div>
        </div>
        <div id="copyStatus" class="subtitle" style="margin-top: 1rem;">可以直接复制这段战报</div>
        <div id="shareText" class="share-box hidden"></div>
        <button id="copyBtn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">复制战报</button>
        <button id="closeShareBtn">返回结果</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameVersion = 'betaCL001';
        const assetBase = 'assets/canada-sprites/';
        const sprites = {};
        const spritePaths = {};

        function loadSprite(key, path) {
            const img = new Image();
            img.src = assetBase + path;
            sprites[key] = img;
            spritePaths[key] = path;
        }

        function viewportHeight() {
            return window.visualViewport ? window.visualViewport.height : window.innerHeight;
        }

        function isTouchDevice() {
            return navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
        }

        function isPhoneMode() {
            return isTouchDevice() && Math.min(window.innerWidth, viewportHeight()) < 620;
        }

        function isPhoneLandscape() {
            return isPhoneMode() && window.innerWidth > viewportHeight();
        }

        [
            ['player', 'player-maple-wallet.png'],
            ['playerAlt', 'player-maple-wallet.png'],
            ['taxEnvelope', 'tax-envelope.png'],
            ['bulkCart', 'bulk-cart.png'],
            ['winterTire', 'winter-tire.png'],
            ['daycareBackpack', 'daycare-backpack.png'],
            ['mortgageBill', 'mortgage-bill.png'],
            ['hydroBill', 'hydro-heating-bill.png'],
            ['planeTicket', 'plane-ticket.png'],
            ['paycheck', 'paycheck.png'],
            ['mysteryBox', 'mystery-box.png'],
            ['boss', 'audit-boss.png'],
            ['overdueSlip', 'overdue-slip.png'],
            ['carBattery', 'car-battery.png'],
            ['dentalBill', 'dental-bill.png'],
            ['schoolSupplies', 'school-supplies.png'],
            ['plumbingBill', 'plumbing-bill.png'],
            ['holidayGifts', 'holiday-gifts.png'],
            ['creditCardWarning', 'credit-card-warning.png'],
            ['coffeeReceipt', 'coffee-receipt.png'],
            ['taxCalculator', 'tax-calculator.png'],
            ['parkingTicket', 'parking-ticket.png'],
            ['acRepair', 'ac-repair.png'],
            ['groceryBag', 'grocery-bag.png'],
            ['internetBill', 'internet-bill.png']
        ].forEach(([key, path]) => loadSprite(key, path));
        
        function resizeCanvas() {
            const prevWidth = canvas.width || 1;
            const prevHeight = canvas.height || 1;
            const phone = isPhoneMode();
            const phoneLandscape = isPhoneLandscape();
            const vh = viewportHeight();
            if (phoneLandscape) {
                canvas.width = 1000;
                canvas.height = 560;
            } else {
                canvas.width = Math.max(320, Math.min(window.innerWidth - (phone ? 0 : 24), 1000));
                canvas.height = phone
                    ? Math.max(520, Math.min(vh - 2, 760))
                    : Math.max(480, Math.min(window.innerHeight - 24, 700));
            }
            const displayScale = phoneLandscape
                ? Math.min(window.innerWidth / canvas.width, (vh - 6) / canvas.height)
                : 1;
            canvas.style.width = Math.floor(canvas.width * displayScale) + 'px';
            canvas.style.height = Math.floor(canvas.height * displayScale) + 'px';
            playTop = phone ? 112 : 156;
            playBottomPad = phone ? 18 : 44;
            ctx.imageSmoothingEnabled = false;
            if (wallet) {
                wallet.baseRadius = phone ? 28 : 35;
                wallet.radius = wallet.baseRadius;
                wallet.x = Math.min(canvas.width - wallet.radius, Math.max(wallet.radius, wallet.x * canvas.width / prevWidth));
                wallet.y = clampToPlayY(wallet.y * canvas.height / prevHeight, wallet.radius);
                wallet.targetX = wallet.x;
                wallet.targetY = wallet.y;
                wallet.maxSpeed = phone ? 10.8 : 11.5;
            }
            updateOrientationGate();
        }

        function updateOrientationGate() {
            const rotateScreen = document.getElementById('rotateScreen');
            if (!rotateScreen) return;
            const needsLandscape = isPhoneMode() && !isPhoneLandscape();
            rotateScreen.classList.toggle('hidden', !needsLandscape);
        }
        
        let gameState = 'start';
        let money = 3500;
        let currentMonth = 0;
        let expenses = [];
        let monthExpenses = [];

        function shuffle(list) {
            const result = [...list];

                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

                    roll > 0.80 ? 'needle' :

                const sizeMod =

                        ...item,

                    }, 150, sideLane));

                    const gapLane = Math.floor(Math.random() * laneCount);

                        if (l === gapLane) continue;

                        }, 110 + l * 22, l, { speed: 2.35 + currentMonth * 0.09 }));

                const alpha = Math.max(0, Math.min(fadeIn, fadeOut));
                const y = 72 + index * 23 - Math.min(13, msg.age * 0.35);
                const x = canvas.width - 22;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = 'rgba(2, 6, 23, 0.72)';
                ctx.fillRect(x - Math.min(420, Math.max(170, msg.text.length * 12)), y - 13, Math.min(420, Math.max(170, msg.text.length * 12)), 22);
                ctx.fillStyle = msg.color;
                ctx.fillText(msg.text, x - 8, y);
            });
            ctx.restore();
        }

        function ensureAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function tone(freq, duration = 0.08, type = 'square', volume = 0.05, when = 0) {
            if (!audioCtx) return;
            const start = audioCtx.currentTime + when;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(volume, start);
            gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(start);
            osc.stop(start + duration);
        }

        function noise(duration = 0.08, volume = 0.035) {
            if (!audioCtx) return;
            const bufferSize = Math.floor(audioCtx.sampleRate * duration);
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const source = audioCtx.createBufferSource();
            const gain = audioCtx.createGain();
            source.buffer = buffer;
            gain.gain.value = volume;
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start();
        }

                tone(260, 0.1, 'square', 0.045, 0.06);
                tone(780, 0.07, 'square', 0.03, 0.14);
            } else if (type === 'boss') {
                noise(0.12, 0.035);

            } else if (type === 'revive') {
                tone(440, 0.08, 'square', 0.045);
                tone(660, 0.08, 'square', 0.045, 0.08);
                tone(990, 0.12, 'square', 0.04, 0.16);

        function checkGraze(item) {
            if (item.grazed || item.amount >= 0 || item.type === 'weird') return;
            const boxW = item.hitW || item.width;
            const boxH = item.hitH || item.height;
            const nearestX = Math.max(item.x - boxW / 2, Math.min(wallet.x, item.x + boxW / 2));
            const nearestY = Math.max(item.y - boxH / 2, Math.min(wallet.y, item.y + boxH / 2));
            const dist = Math.hypot(wallet.x - nearestX, wallet.y - nearestY);
            if (dist < hitRadius() + 28 && dist >= hitRadius() + 2) {
                item.grazed = true;
                grazeCount++;
                if (grazeCount % 3 === 0) {
                    const rebate = 12 + Math.floor(currentMonth * 1.5);

                currentLang === 'en'
                    ? `${label}<br>You still have <strong class="money">$${money.toLocaleString()}</strong> in savings.<br>` +
                      `Spend $${reviveCost.toLocaleString()} to revive once and reset overdue pressure to 35%.<br>` +
                      `Only once per run.`
                    : `${label}<br>你还有 <strong class="money">$${money.toLocaleString()}</strong> 存款。<br>` +
                      `花 $${reviveCost.toLocaleString()} 买一次续命，把逾期压力压回 35%。<br>` +
                      `本局只给一次。`;
            document.getElementById('reviveScreen').classList.remove('hidden');
            playSfx('gameover');
        }

        function resolveKill() {
            if (canRevive()) {
                offerRevive();
            } else {
                gameOver();
            }
        }

        function revivePlayer() {
            money -= reviveCost;
            reviveUsed = true;
            pressure = 35;
            hitFlash = 34;
            lastHitType = 'income';
            items = items.filter(item => item.type === 'income');
            if (boss) boss.hitCooldown = 110;
            document.getElementById('reviveScreen').classList.add('hidden');
            gameState = 'playing';
            showToast(currentLang === 'en'
                ? `💳 Revive bought\n-$${reviveCost.toLocaleString()}, back into the bill storm`
                : `💳 存款续命成功\n-$${reviveCost.toLocaleString()}，继续被账单追`);
            playSfx('revive');
        }
        
        function checkCollision(item) {
            const boxW = item.hitW || item.width;
            const boxH = item.hitH || item.height;
            const nearestX = Math.max(item.x - boxW / 2, Math.min(wallet.x, item.x + boxW / 2));
            const nearestY = Math.max(item.y - boxH / 2, Math.min(wallet.y, item.y + boxH / 2));
            return Math.hypot(wallet.x - nearestX, wallet.y - nearestY) < hitRadius();
        }

        function spawnBoss() {
            const m = months[currentMonth];
            const event = createBossEvent(m);
            boss = {
                ...event,
                x: canvas.width + 150,
                y: (playTop + playableBottom()) / 2,
                width: Math.min(230, canvas.width * 0.34),
                height: 112,
                speed: 5.8 + currentMonth * 0.18,
                phase: Math.random() * Math.PI * 2,
                timer: bossDuration,
                hitCooldown: 0,
                bulletTimer: 42,
                reliefTimer: 95
            };
            bossSpawned = true;
            showToast(currentLang === 'en' ? `Month-end boss: ${displayName(event.name)}` : `月底Boss：${displayName(event.name)}`);
        }

        function spawnBossBullet() {
            if (!boss) return;
            items.push({
                name: '追缴小票',
                amount: -Math.max(35, Math.round(Math.abs(boss.amount) * 0.12)),
                type: 'bill',
                note: '',
                noLate: true,
                width: 82,
                height: 48,
                pattern: Math.random() < 0.45 ? 'sine' : 'straight',
                x: boss.x - boss.width / 2 - 18,
                y: clampToPlayY(boss.y + (Math.random() - 0.5) * boss.height, 28),
                baseY: boss.y,
                speed: 5.2 + Math.random() * 1.2 + currentMonth * 0.12,
                phase: Math.random() * Math.PI * 2,
                amp: 34,
                color: '#ef4444',
                id: Date.now() + Math.random()
            });
        }

        function spawnBossRelief() {
            if (!boss) return;
            items.push({
                name: Math.random() < 0.5 ? '临时退税' : '加班回血',
                amount: 90 + currentMonth * 12,
                type: 'income',
                note: '',
                width: 92,
                height: 54,
                pattern: 'straight',
                x: canvas.width + 70,
                y: clampToPlayY(boss.y + (Math.random() < 0.5 ? -96 : 96), 34),
                baseY: boss.y,
                speed: 4.6 + Math.random() * 0.8,
                phase: Math.random() * Math.PI * 2,
                amp: 20,
                color: '#10b981',
                id: Date.now() + Math.random()
            });
        }

        function updateBoss() {
            if (levelTime >= bossStartTime && !bossSpawned) {
                spawnBoss();
            }
            if (!boss) return;

            const bossTime = levelTime - bossStartTime;
            boss.timer = Math.max(0, levelDuration - levelTime);
            if (boss.x > canvas.width * 0.74) {
                boss.x -= boss.speed;
            } else {
                boss.x = canvas.width * 0.72 + Math.sin(bossTime * 0.035 + boss.phase) * canvas.width * 0.09;
            }
            boss.y = (playTop + playableBottom()) / 2 + Math.sin(bossTime * 0.052 + boss.phase) * Math.min(130, (playableBottom() - playTop) * 0.28);
            boss.y = clampToPlayY(boss.y, 78);

            boss.bulletTimer--;
            if (boss.bulletTimer <= 0) {
                spawnBossBullet();
                boss.bulletTimer = Math.max(30, 58 - currentMonth * 2);
            }
            boss.reliefTimer--;
            if (boss.reliefTimer <= 0) {
                spawnBossRelief();
                boss.reliefTimer = Math.max(75, 112 - currentMonth * 2);
            }

            if (boss.hitCooldown > 0) boss.hitCooldown--;
            if (boss.hitCooldown <= 0 && checkCollision(boss)) {
                if (invincibleTimer > 0) {
                    showFloatText(currentLang === 'en' ? '🍁 Shield blocked audit' : '🍁 护盾挡住审计', '#fbbf24');
                    playSfx('income');
                    boss.hitCooldown = 70;
                    return;
                }
                money += boss.amount;
                changePressure(8);
                recordTransaction(boss.name, boss.amount, 'boss');
                triggerHitFeedback('boss');
                showFloatText(currentLang === 'en'
                    ? `${formatEventName(boss.name, 'boss')} audit hit`
                    : `${formatEventName(boss.name, 'boss')} 审计命中`, '#ef4444');
                boss.hitCooldown = 55;
            }
        }

        function pointerPosition(e) {
            const rect = canvas.getBoundingClientRect();
            const point = e.touches ? e.touches[0] : e;
            return {
                x: (point.clientX - rect.left) * (canvas.width / rect.width),
                y: (point.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDraggingAt(x, y) {
            const dist = Math.hypot(x - wallet.x, y - wallet.y);
            const grabRadius = wallet.radius + 22;
            wallet.dragging = true;
            if (dist < grabRadius) {
                wallet.offsetX = x - wallet.x;
                wallet.offsetY = y - wallet.y;
            } else {
                wallet.offsetX = 0;
                wallet.offsetY = 0;
                moveWalletTo(x, y);
            }
        }

        function moveWalletTo(x, y) {
            wallet.targetX = Math.max(wallet.radius, Math.min(canvas.width - wallet.radius, x - wallet.offsetX));
            wallet.targetY = clampToPlayY(y - wallet.offsetY, wallet.radius);
        }

        function updateWallet() {
            const dx = wallet.targetX - wallet.x;
            const dy = wallet.targetY - wallet.y;
            const dist = Math.hypot(dx, dy);
            if (dist <= wallet.maxSpeed || dist === 0) {
                wallet.x = wallet.targetX;
                wallet.y = wallet.targetY;
                return;
            }
            wallet.x += dx / dist * wallet.maxSpeed;
            wallet.y += dy / dist * wallet.maxSpeed;
        }
        
        function update() {
            if (gameState !== 'playing') return;
            
            levelTime++;
            updateFloatMessages();
            updatePowerState();
            updateWallet();
            updateBoss();
            if (!boss && levelTime % 180 === 0) {
                changePressure(0.9 + currentMonth * 0.12);
            }
            
            itemTimer++;
            if (levelTime < bossStartTime && itemsToSpawn.length > 0 && itemTimer >= itemInterval) {
                spawnItem();
                itemTimer = 0;
            } else if (
                levelTime < bossStartTime - 120 &&
                itemsToSpawn.length === 0 &&
                items.length < 3 &&
                itemTimer >= 82
            ) {
                spawnFillerItem();
                itemTimer = 0;
            }
            
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                if (item.accel) {
                    item.speed = Math.max(2.2, item.speed + item.accel);
                }
                if (item.pattern === 'charge' && item.x < canvas.width * 0.72) {
                    item.speed += 0.035 + currentMonth * 0.004;
                }
                item.x -= item.speed;
                if (item.pattern === 'sine') {
                    item.y = item.baseY + Math.sin(levelTime * 0.055 + item.phase) * item.amp;
                    item.y = clampToPlayY(item.y, (item.hitH || item.height) / 2);
                } else if (item.pattern === 'zigzag') {
                    const block = Math.floor((levelTime + item.phase * 10) / 22) % 2 === 0 ? -1 : 1;
                    item.y += block * (1.4 + currentMonth * 0.03);
                    item.y = clampToPlayY(item.y, (item.hitH || item.height) / 2);
                } else if (item.pattern === 'tracking') {
                    if (item.x > wallet.x + 120) {
                        const drift = Math.max(-2.2, Math.min(2.2, (wallet.y - item.y) * 0.018));
                        item.y += drift;
                    } else {
                        item.y += Math.sin(levelTime * 0.16 + item.phase) * 1.2;
                    }
                    item.y = clampToPlayY(item.y, (item.hitH || item.height) / 2);
                } else if (item.pattern === 'wall') {
                    item.y = item.baseY + Math.sin(levelTime * 0.032 + item.phase) * item.amp;
                    item.y = clampToPlayY(item.y, (item.hitH || item.height) / 2);
                } else if (item.pattern === 'orbit') {
                    item.spin += 0.08;
                    item.y = item.baseY + Math.sin(levelTime * 0.07 + item.phase) * item.amp;
                    item.x += Math.cos(levelTime * 0.045 + item.phase) * 1.2;
                    item.y = clampToPlayY(item.y, (item.hitH || item.height) / 2);
                }
                
                checkGraze(item);

                if (checkCollision(item)) {
                    if (item.type === 'weird') {
                        applyPowerEffect(item);
                        triggerHitFeedback('weird');
                        items.splice(i, 1);
                        continue;
                    }
                    if (item.amount < 0 && invincibleTimer > 0) {
                        showFloatText(currentLang === 'en'
                            ? `🍁 Shield blocked ${displayName(item.name)}`
                            : `🍁 护盾抵消 ${item.name}`, '#fbbf24');
                        playSfx('income');
                        items.splice(i, 1);
                        continue;
                    }
                    money += item.amount;
                    recordTransaction(item.name, item.amount, item.type);
                    triggerHitFeedback(item.type);
                    
                    if (item.type === 'income') {
                        changePressure(-22);
                    } else if (item.type === 'bill') {
                        changePressure(boss ? 0 : 4);
                    }
                    const color = item.amount > 0 ? '#10b981' : '#ef4444';
                    const prefix = item.amount > 0 ? '+' : '';
                    combo = item.amount > 0 ? combo + 1 : 0;
                    const comboText = combo >= 3 ? ` x${combo}` : '';
                    showFloatText(prefix + '$' + Math.abs(item.amount) + ' ' + formatEventName(item.name, item.type) + comboText, color);
                    
                    items.splice(i, 1);
                    continue;
                }
                
                if (item.x < -150) {
                    if (item.type === 'income') {
                        combo = 0;
                        changePressure(4);
                    } else if (item.type === 'bill' && !item.noLate && !boss) {
                        const lateFee = 35 + currentMonth * 5;
                        money -= lateFee;
                        changePressure(5);
                        recordTransaction('逾期费', -lateFee, 'late');
                    }
                    items.splice(i, 1);
                }
            }
            
            if (money <= -2000) {
                killReason = '现金流被斩杀';
                resolveKill();
                return;
            }

            if (pressure >= 100) {
                killReason = '逾期压力被斩杀';
                resolveKill();
                return;
            }
            
            if (levelTime >= levelDuration) {
                finishMonth();
            }
        }

        function pxRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
        }

        function pixelText(text, x, y, size = 12, color = '#fff', align = 'center') {
            ctx.fillStyle = color;
            ctx.font = `bold ${size}px "Courier New", monospace`;
            ctx.textAlign = align;
            ctx.fillText(text, Math.round(x), Math.round(y));
        }

        function spriteReady(key) {
            return sprites[key] && sprites[key].complete && sprites[key].naturalWidth > 0;
        }

        function drawSprite(key, x, y, w, h, rotation = 0) {
            if (!spriteReady(key)) return false;
            ctx.save();
            ctx.translate(Math.round(x), Math.round(y));
            if (rotation) ctx.rotate(rotation);
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(sprites[key], Math.round(-w / 2), Math.round(-h / 2), Math.round(w), Math.round(h));
            ctx.restore();
            return true;
        }

        function drawSpriteFit(key, x, y, maxW, maxH, rotation = 0) {
            if (!spriteReady(key)) return false;
            const img = sprites[key];
            const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight);
            return drawSprite(key, x, y, img.naturalWidth * scale, img.naturalHeight * scale, rotation);
        }

        function billSpriteKey(item) {
            const name = item.name || '';
            if (name.includes('追缴') || name.includes('逾期') || name.includes('小票')) return 'overdueSlip';
            if (name.includes('车打') || name.includes('车保养') || name.includes('车险') || name.includes('SAAQ')) return 'carBattery';
            if (name.includes('牙医') || name.includes('补牙') || name.includes('药')) return 'dentalBill';
            if (name.includes('学校') || name.includes('文具') || name.includes('校服') || name.includes('课后')) return 'schoolSupplies';
            if (name.includes('水管')) return 'plumbingBill';
            if (name.includes('圣诞') || name.includes('礼物') || name.includes('聚餐')) return 'holidayGifts';
            if (name.includes('信用卡') || name.includes('Amazon') || name.includes('黑五')) return 'creditCardWarning';
            if (name.includes('Tims') || name.includes('咖啡')) return 'coffeeReceipt';
            if (name.includes('CRA') || name.includes('税') || name.includes('会计') || name.includes('RRSP')) return 'taxCalculator';
            if (name.includes('停车') || name.includes('罚单')) return 'parkingTicket';
            if (name.includes('空调')) return 'acRepair';
            if (name.includes('买菜') || name.includes('Costco')) return name.includes('Costco') ? 'bulkCart' : 'groceryBag';
            if (name.includes('网络') || name.includes('网费') || name.includes('手机') || name.includes('电话')) return 'internetBill';
            if (name.includes('雪') || name.includes('冬') || name.includes('暖') || name.includes('胎')) return 'winterTire';
            if (name.includes('daycare') || name.includes('孩子') || name.includes('camp')) return 'daycareBackpack';
            if (name.includes('房贷') || name.includes('屋顶') || name.includes('地税')) return 'mortgageBill';
            if (name.includes('水电') || name.includes('电') || name.includes('hydro') || name.includes('暖气')) return 'hydroBill';
            if (name.includes('机票') || name.includes('回国') || name.includes('旅行')) return 'planeTicket';
            if (item.variant === 'needle' || item.variant === 'rush') return 'overdueSlip';
            if (item.variant === 'wall') return 'mortgageBill';
            return 'taxEnvelope';
        }

        function drawPixelBill(item) {
            const x = Math.round(item.x - item.width / 2);
            const y = Math.round(item.y - item.height / 2);
            const w = Math.round(item.width);
            const h = Math.round(item.height);
            const dark = item.variant === 'rush' ? '#7f1d1d' : item.variant === 'heavy' ? '#991b1b' : '#b91c1c';
            const spriteSize =
                item.variant === 'wall' ? 92 :
                item.variant === 'heavy' ? 84 :
                item.variant === 'needle' ? 56 :
                item.variant === 'rush' ? 62 : 74;
            if (drawSpriteFit(billSpriteKey(item), item.x, item.y, spriteSize, spriteSize)) {
                if (item.variant === 'rush') {
                    pxRect(item.x + item.width / 2 - 18, item.y - 7, 16, 5, '#fbbf24');
                    pxRect(item.x + item.width / 2 - 28, item.y + 4, 22, 5, '#f97316');
                }
                return;
            }
            if (item.variant === 'wall') {
                pxRect(x + 4, y + 4, w, h, '#111827');
                pxRect(x, y, w, h, '#b91c1c');
                pxRect(x + 5, y + 5, w - 10, h - 10, '#fee2e2');
                pxRect(x + 10, y + 9, w - 20, 5, '#fecaca');
                for (let yy = y + 14; yy < y + h - 12; yy += 22) {
                    pxRect(x + 10, yy, w - 20, 5, '#ef4444');
                    pxRect(x + 10, yy + 9, w - 28, 4, '#fca5a5');
                }
                pxRect(x + w - 18, y + 12, 10, 10, '#ef4444');
                pxRect(x + w - 15, y + 15, 4, 4, '#fee2e2');
                pxRect(x, y, w, 6, '#ef4444');
                pxRect(x, y + h - 6, w, 6, '#7f1d1d');
                pixelText('BILL', item.x, item.y + 5, 13, '#7f1d1d');
                return;
            }
            if (item.variant === 'needle') {
                pxRect(x + 3, y + 3, w - 8, h, '#111827');
                pxRect(x, y + 6, w - 14, h - 12, '#ef4444');
                pxRect(x + w - 18, y, 18, h, '#fecaca');
                pxRect(x + w - 10, y + h / 2 - 5, 12, 10, '#ef4444');
                pxRect(x + 9, y + 14, w - 30, 4, '#fee2e2');
                pxRect(x + 9, y + 25, w - 36, 4, '#fee2e2');
                pxRect(x + 7, y + h - 12, w - 28, 4, '#b91c1c');
                pixelText('!', item.x - 2, item.y + 7, 18, '#fff');
                return;
            }
            if (item.variant === 'ticket') {
                pxRect(x + 3, y + 3, w, h, '#111827');
                pxRect(x, y, w, h, '#dc2626');
                pxRect(x + 7, y + 7, w - 14, h - 14, '#fee2e2');
                for (let yy = y + 6; yy < y + h - 4; yy += 10) {
                    pxRect(x, yy, 5, 4, '#070914');
                    pxRect(x + w - 5, yy, 5, 4, '#070914');
                }
                pxRect(x + 12, y + 13, w - 24, 4, '#ef4444');
                pxRect(x + 12, y + 25, w - 36, 4, '#f87171');
                pxRect(x + w - 21, y + 10, 11, 11, '#ef4444');
                pxRect(x + w - 18, y + 13, 5, 5, '#fee2e2');
                pixelText('$', item.x, item.y + 8, 16, '#7f1d1d');
                return;
            }
            pxRect(x + 4, y + 4, w, h, '#111827');
            pxRect(x, y, w, h, dark);
            pxRect(x + 5, y + 5, w - 10, h - 10, '#fee2e2');
            pxRect(x + 5, y + 5, w - 10, 8, '#ef4444');
            pxRect(x + 10, y + 22, w - 20, 5, '#ef4444');
            pxRect(x + 10, y + 34, w * 0.45, 5, '#f87171');
            pxRect(x + w - 22, y + h - 20, 14, 12, '#7f1d1d');
            pxRect(x + 11, y + 11, 10, 8, '#fecaca');
            pxRect(x + w - 31, y + 11, 16, 8, '#f87171');
            if (item.variant === 'heavy') {
                pxRect(x - 5, y + 8, 5, h - 16, '#7f1d1d');
                pxRect(x + w, y + 8, 5, h - 16, '#7f1d1d');
                pxRect(x + 14, y + h - 12, w - 28, 4, '#ef4444');
            }
            if (item.variant === 'rush') {
                pxRect(x - 14, y + 10, 10, 7, '#f97316');
                pxRect(x - 22, y + 22, 16, 7, '#fbbf24');
                pxRect(x + w - 12, y + 10, 18, h - 20, '#ef4444');
            }
            if (item.variant === 'zigzag') {
                for (let xx = x + 8; xx < x + w - 8; xx += 16) {
                    pxRect(xx, y - 5, 8, 5, '#fee2e2');
                    pxRect(xx + 8, y + h, 8, 5, '#fee2e2');
                }
            }
            pixelText(item.variant === 'rush' ? '!!' : '$', item.x, item.y + 7, 18, '#7f1d1d');
        }

        function drawPixelIncome(item) {
            const x = Math.round(item.x - item.width / 2);
            const y = Math.round(item.y - item.height / 2);
            const w = Math.round(item.width);
            const h = Math.round(item.height);
            if (drawSpriteFit('paycheck', item.x, item.y, item.variant === 'bonus' ? 74 : 66, item.variant === 'bonus' ? 74 : 66)) {
                return;
            }
            pxRect(x + 5, y + 5, w - 2, h - 2, '#052e16');
            pxRect(x + 6, y, w - 12, h, '#064e3b');

            pxRect(x + 8, y + 5, w - 16, h - 10, '#4ade80');
            pxRect(x + 15, y + 12, w - 30, h - 24, '#bbf7d0');
            pxRect(x + 16, y + 13, 10, 8, '#16a34a');
            pxRect(x + w - 26, y + h - 21, 10, 8, '#16a34a');
            pxRect(x + 24, y + 20, w - 48, 5, '#15803d');
            pxRect(x + 24, y + 32, w - 56, 5, '#15803d');
            pxRect(x + 10, y + 8, w - 20, 3, '#dcfce7');
